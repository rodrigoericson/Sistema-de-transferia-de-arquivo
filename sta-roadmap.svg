<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">

  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan2" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#ffffff05"/>
      <rect y="2" width="4" height="2" fill="#00000000"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg2)"/>
  <rect width="100%" height="100%" fill="url(#scan2)" opacity=".2"/>
  <rect x="10" y="10" width="980" height="400" rx="6" fill="none" stroke="#00ff88" stroke-width="1.5"/>

  <!-- Header -->
  <text x="30" y="42" fill="#7dffb3" font-size="22" font-family="JetBrains Mono, Consolas, monospace" filter="url(#glow2)">MISSION ROADMAP</text>
  <text x="850" y="42" fill="#555" font-size="14" font-family="JetBrains Mono, Consolas, monospace">PROGRESS: 63%</text>
  <line x1="25" y1="55" x2="975" y2="55" stroke="#00ff8844"/>

  <!-- Progress bar geral -->
  <rect x="30" y="65" width="940" height="8" rx="4" fill="#1a1a1a"/>
  <rect x="30" y="65" width="590" height="8" rx="4" fill="#00ff66"/>
  <rect x="620" y="65" width="50" height="8" rx="4" fill="#ffd54d"/>

  <!-- Timeline line -->
  <line x1="80" y1="100" x2="80" y2="390" stroke="#00ff8833" stroke-width="2"/>

  <!-- Fases -->
  <g font-family="JetBrains Mono, Consolas, monospace">

    <!-- Fase 1-3 -->
    <circle cx="80" cy="115" r="8" fill="#00ff66"/>
    <text x="110" y="112" fill="#00ff66" font-size="16">FASES 1-3</text>
    <text x="260" y="112" fill="#7dffb3" font-size="13">COMPLETE</text>
    <text x="110" y="132" fill="#555" font-size="13">Plumbing, janela horária, transferência core, refactoring</text>

    <!-- Fase 5.1 -->
    <circle cx="80" cy="165" r="8" fill="#00ff66"/>
    <text x="110" y="162" fill="#00ff66" font-size="16">FASE 5.1</text>
    <text x="260" y="162" fill="#7dffb3" font-size="13">COMPLETE</text>
    <text x="110" y="182" fill="#555" font-size="13">Extrai STA.Core como biblioteca compartilhada</text>

    <!-- Fase 5.2 -->
    <circle cx="80" cy="215" r="8" fill="#00ff66"/>
    <text x="110" y="212" fill="#00ff66" font-size="16">FASE 5.2</text>
    <text x="260" y="212" fill="#7dffb3" font-size="13">COMPLETE</text>
    <text x="110" y="232" fill="#555" font-size="13">Tabelas Etapa/Rota/Destino + fallback banco→XML</text>

    <!-- Fase 5.3 -->
    <circle cx="80" cy="265" r="8" fill="#00ff66"/>
    <text x="110" y="262" fill="#00ff66" font-size="16">FASE 5.3</text>
    <text x="260" y="262" fill="#7dffb3" font-size="13">COMPLETE</text>
    <text x="110" y="282" fill="#555" font-size="13">Log granular por arquivo (tbl_log_arquivo) + auditoria</text>

    <!-- Fase 6 -->
    <circle cx="80" cy="315" r="8" fill="none" stroke="#ffd54d" stroke-width="2"/>
    <circle cx="80" cy="315" r="4" fill="#ffd54d"/>
    <text x="110" y="312" fill="#ffd54d" font-size="16">FASE 6</text>
    <text x="260" y="312" fill="#ffd54d" font-size="13">IN PROGRESS</text>
    <text x="110" y="332" fill="#888" font-size="13">Web API REST + CRUD + Worker control + Auth</text>

    <!-- Fase 7 -->
    <circle cx="80" cy="362" r="8" fill="none" stroke="#444" stroke-width="1.5"/>
    <text x="110" y="359" fill="#666" font-size="16">FASE 7</text>
    <text x="260" y="359" fill="#444" font-size="13">QUEUED</text>
    <text x="110" y="379" fill="#444" font-size="13">Frontend React + Dashboard + Login</text>

  </g>

  <!-- Stats lateral direita -->
  <line x1="700" y1="95" x2="700" y2="390" stroke="#00ff8822"/>
  <g font-family="JetBrains Mono, Consolas, monospace">
    <text x="730" y="120" fill="#555" font-size="12">STATS</text>

    <text x="730" y="155" fill="#7dffb3" font-size="32" filter="url(#glow2)">72</text>
    <text x="730" y="175" fill="#555" font-size="12">TESTS PASSING</text>

    <text x="730" y="220" fill="#7dffb3" font-size="32" filter="url(#glow2)">15</text>
    <text x="730" y="240" fill="#555" font-size="12">COMMITS</text>

    <text x="730" y="285" fill="#7dffb3" font-size="32" filter="url(#glow2)">7</text>
    <text x="730" y="305" fill="#555" font-size="12">DB TABLES</text>

    <text x="730" y="350" fill="#7dffb3" font-size="32" filter="url(#glow2)">15</text>
    <text x="730" y="370" fill="#555" font-size="12">API ENDPOINTS</text>
  </g>

</svg>