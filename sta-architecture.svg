<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="380" viewBox="0 0 1000 380">

  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan3" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#ffffff05"/>
      <rect y="2" width="4" height="2" fill="#00000000"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg3)"/>
  <rect width="100%" height="100%" fill="url(#scan3)" opacity=".2"/>
  <rect x="10" y="10" width="980" height="360" rx="6" fill="none" stroke="#00ff88" stroke-width="1.5"/>

  <!-- Header -->
  <text x="30" y="42" fill="#7dffb3" font-size="22" font-family="JetBrains Mono, Consolas, monospace" filter="url(#glow3)">SYSTEM ARCHITECTURE</text>
  <text x="870" y="42" fill="#555" font-size="14" font-family="JetBrains Mono, Consolas, monospace">.NET 10</text>
  <line x1="25" y1="55" x2="975" y2="55" stroke="#00ff8844"/>

  <!-- Worker Box -->
  <rect x="40" y="80" width="260" height="160" rx="4" fill="#0d1a0d" stroke="#00ff66" stroke-width="1.5"/>
  <text x="60" y="105" fill="#00ff66" font-size="14" font-family="JetBrains Mono, Consolas, monospace">■ STA.WORKER</text>
  <text x="60" y="130" fill="#7dffb3" font-size="12" font-family="JetBrains Mono, Consolas, monospace">BackgroundService</text>
  <text x="60" y="155" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Carrega etapas</text>
  <text x="60" y="173" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Transfere arquivos</text>
  <text x="60" y="191" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Compacta (7-Zip)</text>
  <text x="60" y="209" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Grava log/arquivo</text>
  <text x="60" y="227" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">└─ Ciclo 5 min</text>

  <!-- API Box -->
  <rect x="40" y="260" width="260" height="90" rx="4" fill="#1a1a0d" stroke="#ffd54d" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="60" y="285" fill="#ffd54d" font-size="14" font-family="JetBrains Mono, Consolas, monospace">◐ STA.API [WIP]</text>
  <text x="60" y="305" fill="#888" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ CRUD etapas/rotas/destinos</text>
  <text x="60" y="323" fill="#888" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ GET logs + Worker control</text>
  <text x="60" y="341" fill="#888" font-size="11" font-family="JetBrains Mono, Consolas, monospace">└─ Swagger + Health Check</text>

  <!-- Core Box (centro) -->
  <rect x="370" y="130" width="260" height="140" rx="4" fill="#0d0d1a" stroke="#6688ff" stroke-width="1.5"/>
  <text x="390" y="155" fill="#6688ff" font-size="14" font-family="JetBrains Mono, Consolas, monospace">■ STA.CORE</text>
  <text x="390" y="178" fill="#7daaff" font-size="12" font-family="JetBrains Mono, Consolas, monospace">Shared Library</text>
  <text x="390" y="203" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Entities (EF Core)</text>
  <text x="390" y="221" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Repositories</text>
  <text x="390" y="239" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Services</text>
  <text x="390" y="257" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">└─ Models + Settings</text>

  <!-- Database Box (direita) -->
  <rect x="700" y="100" width="260" height="190" rx="4" fill="#0d1a1a" stroke="#00bcd4" stroke-width="1.5"/>
  <text x="720" y="125" fill="#00bcd4" font-size="14" font-family="JetBrains Mono, Consolas, monospace">■ POSTGRESQL 15</text>
  <text x="720" y="148" fill="#66ddee" font-size="12" font-family="JetBrains Mono, Consolas, monospace">Schema: sta</text>
  <text x="720" y="173" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_sistema</text>
  <text x="720" y="191" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_parametro_sistema</text>
  <text x="720" y="209" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_etapa_transferencia</text>
  <text x="720" y="227" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_rota_transferencia</text>
  <text x="720" y="245" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_rota_destino</text>
  <text x="720" y="263" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_log_processo</text>
  <text x="720" y="281" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">└─ tbl_log_arquivo</text>

  <!-- Frontend Box (abaixo à direita) -->
  <rect x="700" y="310" width="260" height="50" rx="4" fill="#111" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="720" y="335" fill="#666" font-size="14" font-family="JetBrains Mono, Consolas, monospace">○ STA.WEB [PHASE 7]</text>
  <text x="720" y="352" fill="#444" font-size="11" font-family="JetBrains Mono, Consolas, monospace">React + Vite + shadcn/ui</text>

  <!-- Arrows: Worker → Core -->
  <line x1="300" y1="160" x2="370" y2="180" stroke="#00ff6688" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="310" y="155" fill="#00ff6666" font-size="10" font-family="JetBrains Mono, Consolas, monospace">uses</text>

  <!-- Arrows: API → Core -->
  <line x1="300" y1="300" x2="370" y2="240" stroke="#ffd54d88" stroke-width="1.5"/>
  <text x="310" y="280" fill="#ffd54d66" font-size="10" font-family="JetBrains Mono, Consolas, monospace">uses</text>

  <!-- Arrows: Core → DB -->
  <line x1="630" y1="200" x2="700" y2="200" stroke="#6688ff88" stroke-width="1.5"/>
  <text x="645" y="192" fill="#6688ff66" font-size="10" font-family="JetBrains Mono, Consolas, monospace">EF Core</text>

  <!-- Arrows: Frontend → API -->
  <line x1="700" y1="335" x2="300" y2="320" stroke="#44444488" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="500" y="340" fill="#44444488" font-size="10" font-family="JetBrains Mono, Consolas, monospace">REST API</text>

</svg>