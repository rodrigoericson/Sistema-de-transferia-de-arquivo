<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#ffffff05"/>
      <rect y="2" width="4" height="2" fill="#00000000"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#scan)" opacity=".2"/>

  <!-- Moldura -->
  <rect x="10" y="10" width="980" height="380" rx="6" fill="none" stroke="#00ff88" stroke-width="1.5"/>

  <!-- Header -->
  <text x="30" y="42" fill="#7dffb3" font-size="22" font-family="JetBrains Mono, Consolas, monospace" filter="url(#glow)">STA CONTROL CENTER</text>
  <text x="680" y="42" fill="#555" font-size="14" font-family="JetBrains Mono, Consolas, monospace">Sistema de Transferência de Arquivos</text>
  <text x="920" y="42" fill="#55ff55" font-size="14" font-family="JetBrains Mono, Consolas, monospace">v6.0</text>
  <line x1="25" y1="55" x2="975" y2="55" stroke="#00ff8844"/>

  <!-- Módulos (coluna esquerda) -->
  <text x="30" y="80" fill="#555" font-size="12" font-family="JetBrains Mono, Consolas, monospace">MODULES</text>
  <g fill="#7dffb3" font-family="JetBrains Mono, Consolas, monospace" font-size="16">
    <text x="40" y="108">●</text><text x="60" y="108" fill="#00ff66">WORKER SERVICE</text>
    <text x="300" y="108" fill="#00ff66" font-size="13">RUNNING</text>

    <text x="40" y="138">●</text><text x="60" y="138" fill="#00ff66">POSTGRESQL 15</text>
    <text x="300" y="138" fill="#00ff66" font-size="13">CONNECTED</text>

    <text x="40" y="168">●</text><text x="60" y="168" fill="#00ff66">FILE TRANSFER</text>
    <text x="300" y="168" fill="#00ff66" font-size="13">72 TESTS OK</text>

    <text x="40" y="198">●</text><text x="60" y="198" fill="#00ff66">EF CORE 10</text>
    <text x="300" y="198" fill="#00ff66" font-size="13">7 TABLES</text>

    <text x="40" y="228">◐</text><text x="60" y="228" fill="#ffd54d">REST API</text>
    <text x="300" y="228" fill="#ffd54d" font-size="13">PHASE 6 [WIP]</text>

    <text x="40" y="258">○</text><text x="60" y="258" fill="#666">REACT DASHBOARD</text>
    <text x="300" y="258" fill="#666" font-size="13">PHASE 7</text>

    <text x="40" y="288">○</text><text x="60" y="288" fill="#666">AUTH (AD + JWT)</text>
    <text x="300" y="288" fill="#666" font-size="13">PHASE 6e</text>
  </g>

  <!-- Métricas (coluna direita) -->
  <text x="530" y="80" fill="#555" font-size="12" font-family="JetBrains Mono, Consolas, monospace">PROJECT METRICS</text>
  <g font-family="JetBrains Mono, Consolas, monospace" font-size="15">
    <text x="540" y="108" fill="#7dffb3">TESTS</text>
    <rect x="660" y="95" width="220" height="12" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="95" width="220" height="12" rx="2" fill="#00ff66"/>
    <text x="900" y="108" fill="#55ff55">72/72</text>

    <text x="540" y="143" fill="#7dffb3">PHASES</text>
    <rect x="660" y="130" width="220" height="12" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="130" width="138" height="12" rx="2" fill="#00ff66"/>
    <rect x="798" y="130" width="27" height="12" rx="2" fill="#ffd54d"/>
    <text x="900" y="143" fill="#55ff55">5/8</text>

    <text x="540" y="178" fill="#7dffb3">COMMITS</text>
    <rect x="660" y="165" width="220" height="12" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="165" width="185" height="12" rx="2" fill="#00ff66"/>
    <text x="900" y="178" fill="#55ff55">15</text>

    <text x="540" y="213" fill="#7dffb3">TABLES</text>
    <rect x="660" y="200" width="220" height="12" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="200" width="220" height="12" rx="2" fill="#00ff66"/>
    <text x="900" y="213" fill="#55ff55">7/7</text>

    <text x="540" y="248" fill="#7dffb3">ENDPOINTS</text>
    <rect x="660" y="235" width="220" height="12" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="235" width="165" height="12" rx="2" fill="#00ff66"/>
    <text x="900" y="248" fill="#55ff55">15</text>

    <text x="540" y="283" fill="#7dffb3">COVERAGE</text>
    <rect x="660" y="270" width="220" height="12" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="270" width="176" height="12" rx="2" fill="#00ff66"/>
    <text x="900" y="283" fill="#55ff55">80%</text>
  </g>

  <!-- Separador rodapé -->
  <line x1="25" y1="310" x2="975" y2="310" stroke="#00ff8844"/>

  <!-- Rodapé -->
  <g fill="#7dffb3" font-size="14" font-family="JetBrains Mono, Consolas, monospace">
    <text x="40" y="340">.NET 10.0</text>
    <text x="170" y="340" fill="#555">│</text>
    <text x="190" y="340">EF Core 10</text>
    <text x="330" y="340" fill="#555">│</text>
    <text x="350" y="340">PostgreSQL 15</text>
    <text x="530" y="340" fill="#555">│</text>
    <text x="550" y="340">xUnit + Moq</text>
    <text x="700" y="340" fill="#555">│</text>
    <text x="720" y="340">Windows Service</text>

    <text x="40" y="370" fill="#555">LAST BUILD: 0 WARNINGS, 0 ERRORS</text>
    <text x="600" y="370" fill="#555">UPTIME: ∞</text>
    <text x="820" y="370" fill="#00ff66">ALL SYSTEMS GO</text>
  </g>

</svg>