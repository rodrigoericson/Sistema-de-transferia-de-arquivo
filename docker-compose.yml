services:
  postgres:
    image: postgres:15-alpine
    container_name: sta-postgres
    environment:
      POSTGRES_DB: sta
      POSTGRES_USER: sta_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - sta-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sta_user -d sta"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sta-pgdata:
