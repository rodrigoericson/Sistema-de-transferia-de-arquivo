    <text x="240" y="782" fill="#7dffb3" font-size="11">CONCLUÍDO</text>
    <text x="80" y="799" fill="#444" font-size="11">Log granular por arquivo + auditoria de segurança</text>

    <circle cx="60" cy="825" r="6" fill="none" stroke="#ffd54d" stroke-width="2"/>
    <circle cx="60" cy="825" r="3" fill="#ffd54d" class="pulse-dot"/>
    <text x="80" y="822" fill="#ffd54d" font-size="14">FASE 6</text>
    <text x="240" y="822" fill="#ffd54d" font-size="11">EM PROGRESSO</text>
    <text x="80" y="839" fill="#888" font-size="11">Web API REST + CRUD + Logs + Controle do Worker + Auth</text>

    <circle cx="60" cy="860" r="6" fill="none" stroke="#444" stroke-width="1.5"/>
    <text x="80" y="857" fill="#666" font-size="14">FASES 7-8</text>
    <text x="240" y="857" fill="#444" font-size="11">NA FILA</text>
    <text x="80" y="874" fill="#333" font-size="11">Dashboard React + Notificações + CI/CD + Docker</text>
  </g>

  <!-- RODAPÉ -->
  <line x1="20" y1="885" x2="980" y2="885" stroke="#00ff8833"/>
  <g fill="#555" font-size="12" font-family="JetBrains Mono, Consolas, monospace">
    <text x="30" y="905">.NET 10 │ EF Core 10 │ PostgreSQL 15 │ xUnit + Moq │ Windows Service │ ASP.NET Core</text>
    <text x="760" y="905" fill="#00ff66">TODOS OS SISTEMAS OPERACIONAIS</text>
  </g>

</svg>