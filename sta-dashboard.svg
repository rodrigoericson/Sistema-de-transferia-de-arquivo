<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="920" viewBox="0 0 1000 920">

  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .cursor { animation: blink 1.2s step-end infinite; }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
    .wip-bar { animation: pulse 2.5s ease-in-out infinite; }
  </style>

  <defs>
    <linearGradient id="bgMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#040404"/>
    </linearGradient>
    <filter id="glowMain">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgMain)"/>
  <rect x="8" y="8" width="984" height="904" rx="6" fill="none" stroke="#00ff88" stroke-width="1.5"/>

  <!-- CABEÇALHO -->
  <text x="30" y="40" fill="#7dffb3" font-size="22" font-family="JetBrains Mono, Consolas, monospace" filter="url(#glowMain)">CENTRAL DE CONTROLE STA</text>
  <text x="430" y="40" fill="#7dffb3" font-size="22" font-family="JetBrains Mono, Consolas, monospace" class="cursor">_</text>
  <text x="720" y="40" fill="#555" font-size="13" font-family="JetBrains Mono, Consolas, monospace">Sistema de Transferência de Arquivos</text>
  <text x="940" y="40" fill="#00ff66" font-size="14" font-family="JetBrains Mono, Consolas, monospace">v6.0</text>
  <line x1="20" y1="52" x2="980" y2="52" stroke="#00ff8855"/>

  <!-- MÓDULOS + MÉTRICAS -->
  <text x="30" y="75" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">MÓDULOS DO SISTEMA</text>
  <text x="530" y="75" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">MÉTRICAS DO PROJETO</text>

  <g font-family="JetBrains Mono, Consolas, monospace" font-size="15">
    <circle cx="45" cy="97" r="5" fill="#00ff66" class="pulse-dot"/>
    <text x="60" y="102" fill="#00ff66">SERVIÇO WORKER</text>
    <text x="300" y="102" fill="#00ff66" font-size="12">RODANDO</text>

    <circle cx="45" cy="127" r="5" fill="#00ff66"/>
    <text x="60" y="132" fill="#00ff66">POSTGRESQL 15</text>
    <text x="300" y="132" fill="#00ff66" font-size="12">CONECTADO</text>

    <circle cx="45" cy="157" r="5" fill="#00ff66"/>
    <text x="60" y="162" fill="#00ff66">MOTOR DE TRANSFERÊNCIA</text>
    <text x="300" y="162" fill="#00ff66" font-size="12">72 TESTES OK</text>

    <circle cx="45" cy="187" r="5" fill="#00ff66"/>
    <text x="60" y="192" fill="#00ff66">EF CORE 10 + MIGRATIONS</text>
    <text x="300" y="192" fill="#00ff66" font-size="12">7 TABELAS</text>

    <circle cx="45" cy="217" r="5" fill="#ffd54d" class="pulse-dot"/>
    <text x="60" y="222" fill="#ffd54d">API REST (ASP.NET Core)</text>
    <text x="300" y="222" fill="#ffd54d" font-size="12">FASE 6 [EM PROGRESSO]</text>

    <circle cx="45" cy="247" r="5" fill="#333"/>
    <text x="60" y="252" fill="#666">DASHBOARD REACT</text>
    <text x="300" y="252" fill="#444" font-size="12">FASE 7</text>

    <circle cx="45" cy="277" r="5" fill="#333"/>
    <text x="60" y="282" fill="#666">AUTH (AD + JWT + TOTP)</text>
    <text x="300" y="282" fill="#444" font-size="12">FASE 6e</text>
  </g>

  <g font-family="JetBrains Mono, Consolas, monospace" font-size="14">
    <text x="540" y="102" fill="#7dffb3">TESTES</text>
    <rect x="660" y="89" width="220" height="11" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="89" width="220" height="11" rx="2" fill="#00ff66"/>
    <text x="900" y="102" fill="#55ff55" font-size="13">72/72</text>

    <text x="540" y="132" fill="#7dffb3">FASES</text>
    <rect x="660" y="119" width="220" height="11" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="119" width="138" height="11" rx="2" fill="#00ff66"/>
    <rect x="798" y="119" width="27" height="11" rx="2" fill="#ffd54d" class="wip-bar"/>
    <text x="900" y="132" fill="#55ff55" font-size="13">5/8</text>

    <text x="540" y="162" fill="#7dffb3">COMMITS</text>
    <rect x="660" y="149" width="220" height="11" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="149" width="185" height="11" rx="2" fill="#00ff66"/>
    <text x="900" y="162" fill="#55ff55" font-size="13">15</text>

    <text x="540" y="192" fill="#7dffb3">TABELAS</text>
    <rect x="660" y="179" width="220" height="11" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="179" width="220" height="11" rx="2" fill="#00ff66"/>
    <text x="900" y="192" fill="#55ff55" font-size="13">7/7</text>

    <text x="540" y="222" fill="#7dffb3">ENDPOINTS</text>
    <rect x="660" y="209" width="220" height="11" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="209" width="165" height="11" rx="2" fill="#00ff66"/>
    <text x="900" y="222" fill="#55ff55" font-size="13">15</text>

    <text x="540" y="252" fill="#7dffb3">BUILD</text>
    <rect x="660" y="239" width="220" height="11" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="239" width="220" height="11" rx="2" fill="#00ff66"/>
    <text x="900" y="252" fill="#55ff55" font-size="13">0 ERROS</text>
  </g>

  <!-- ARQUITETURA -->
  <line x1="20" y1="305" x2="980" y2="305" stroke="#00ff8833"/>
  <text x="30" y="330" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">ARQUITETURA DO SISTEMA</text>

  <rect x="30" y="345" width="240" height="130" rx="4" fill="#0d1a0d" stroke="#00ff66" stroke-width="1"/>
  <text x="50" y="368" fill="#00ff66" font-size="13" font-family="JetBrains Mono, Consolas, monospace">■ STA.WORKER</text>
  <text x="50" y="388" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Carrega etapas</text>
  <text x="50" y="405" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Transfere arquivos</text>
  <text x="50" y="422" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Compacta (7-Zip)</text>
  <text x="50" y="439" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Log granular</text>
  <text x="50" y="456" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">└─ Ciclo 5 min</text>

  <rect x="30" y="490" width="240" height="80" rx="4" fill="#1a1a0d" stroke="#ffd54d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="50" y="513" fill="#ffd54d" font-size="13" font-family="JetBrains Mono, Consolas, monospace">◐ STA.API [EM PROGRESSO]</text>
  <text x="50" y="533" fill="#888" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ CRUD + Swagger</text>
  <text x="50" y="550" fill="#888" font-size="11" font-family="JetBrains Mono, Consolas, monospace">└─ Controle do Worker</text>

  <rect x="380" y="380" width="240" height="120" rx="4" fill="#0d0d1a" stroke="#6688ff" stroke-width="1"/>
  <text x="400" y="403" fill="#6688ff" font-size="13" font-family="JetBrains Mono, Consolas, monospace">■ STA.CORE</text>
  <text x="400" y="423" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Entidades (EF Core)</text>
  <text x="400" y="440" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Repositórios</text>
  <text x="400" y="457" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ Serviços</text>
  <text x="400" y="474" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">└─ Models + Settings</text>

  <rect x="730" y="345" width="240" height="170" rx="4" fill="#0d1a1a" stroke="#00bcd4" stroke-width="1"/>
  <text x="750" y="368" fill="#00bcd4" font-size="13" font-family="JetBrains Mono, Consolas, monospace">■ POSTGRESQL 15</text>
  <text x="750" y="388" fill="#66ddee" font-size="11" font-family="JetBrains Mono, Consolas, monospace">Schema: sta (7 tabelas)</text>
  <text x="750" y="410" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_sistema</text>
  <text x="750" y="427" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_parametro_sistema</text>
  <text x="750" y="444" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_etapa_transferencia</text>
  <text x="750" y="461" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_rota_transferencia</text>
  <text x="750" y="478" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_rota_destino</text>
  <text x="750" y="495" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_log_processo</text>
  <text x="750" y="512" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">└─ tbl_log_arquivo</text>

  <rect x="730" y="530" width="240" height="42" rx="4" fill="#111" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="750" y="555" fill="#666" font-size="13" font-family="JetBrains Mono, Consolas, monospace">○ STA.WEB [FASE 7]</text>

  <line x1="270" y1="410" x2="380" y2="430" stroke="#00ff6666" stroke-width="1.5"/>
  <line x1="270" y1="530" x2="380" y2="470" stroke="#ffd54d55" stroke-width="1.5"/>
  <line x1="620" y1="440" x2="730" y2="440" stroke="#6688ff66" stroke-width="1.5"/>
  <line x1="730" y1="551" x2="270" y2="530" stroke="#33333366" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="305" y="405" fill="#00ff6644" font-size="9" font-family="JetBrains Mono, Consolas, monospace">usa</text>
  <text x="305" y="510" fill="#ffd54d44" font-size="9" font-family="JetBrains Mono, Consolas, monospace">usa</text>
  <text x="650" y="432" fill="#6688ff44" font-size="9" font-family="JetBrains Mono, Consolas, monospace">EF Core</text>

  <!-- ROADMAP -->
  <line x1="20" y1="590" x2="980" y2="590" stroke="#00ff8833"/>
  <text x="30" y="615" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">ROADMAP DA MISSÃO</text>

  <rect x="30" y="628" width="940" height="6" rx="3" fill="#1a1a1a"/>
  <rect x="30" y="628" width="590" height="6" rx="3" fill="#00ff66"/>
  <rect x="620" y="628" width="50" height="6" rx="3" fill="#ffd54d" class="wip-bar"/>
  <text x="930" y="624" fill="#555" font-size="10" font-family="JetBrains Mono, Consolas, monospace">63%</text>

  <line x1="60" y1="650" x2="60" y2="855" stroke="#00ff8822" stroke-width="2"/>

  <g font-family="JetBrains Mono, Consolas, monospace">
    <circle cx="60" cy="665" r="6" fill="#00ff66"/>
    <text x="80" y="662" fill="#00ff66" font-size="14">FASES 1-3</text>
    <text x="240" y="662" fill="#7dffb3" font-size="11">CONCLUÍDO</text>
    <text x="80" y="679" fill="#444" font-size="11">Plumbing, janela horária, transferência core, refatoração</text>

    <circle cx="60" cy="705" r="6" fill="#00ff66"/>
    <text x="80" y="702" fill="#00ff66" font-size="14">FASE 5.1</text>
    <text x="240" y="702" fill="#7dffb3" font-size="11">CONCLUÍDO</text>
    <text x="80" y="719" fill="#444" font-size="11">STA.Core extraído como biblioteca compartilhada</text>

    <circle cx="60" cy="745" r="6" fill="#00ff66"/>
    <text x="80" y="742" fill="#00ff66" font-size="14">FASE 5.2</text>
    <text x="240" y="742" fill="#7dffb3" font-size="11">CONCLUÍDO</text>
    <text x="80" y="759" fill="#444" font-size="11">Tabelas Etapa/Rota/Destino + configuração via banco</text>

    <circle cx="60" cy="785" r="6" fill="#00ff66"/>
